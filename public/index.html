<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>飯店庫存管理系統</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 登入頁 -->
  <div id="loginPage" class="page">
    <div class="login-container">
      <div class="login-box">
        <h1>🏨 飯店庫存管理</h1>
        <div id="loginError" class="error-message"></div>
        <form id="loginForm" onsubmit="handleLogin(event)">
          <div class="form-group">
            <label for="username">帳號</label>
            <input type="text" id="username" placeholder="輸入帳號" required>
          </div>
          <div class="form-group">
            <label for="password">密碼</label>
            <input type="password" id="password" placeholder="輸入密碼" required>
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%;">登入</button>
        </form>
      </div>
    </div>
  </div>

  <!-- 儀表板 -->
  <div id="dashboardPage" class="page" style="display: none;">
    <div class="container">
      <div class="dashboard-header">
        <h1>📊 飯店庫存管理系統</h1>
        <div class="user-info">
          <strong id="userDisplay"></strong>
          <button class="logout-btn" onclick="handleLogout()">登出</button>
        </div>
      </div>

      <!-- 標籤 -->
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('inventory')">📝 庫存填報</button>
        <button class="tab-btn" onclick="switchTab('orders')">📦 叫貨單</button>
        <button class="tab-btn" onclick="switchTab('history')">📋 歷史記錄</button>
        <button class="tab-btn" id="settingsTabBtn" onclick="switchTab('settings')" style="display: none;">⚙️ 叫貨設定</button>
        <button class="tab-btn" id="productsTabBtn" onclick="switchTab('products')" style="display: none;">📦 品項管理</button>
        <button class="tab-btn" id="usersTabBtn" onclick="switchTab('users')" style="display: none;">👥 用戶管理</button>
      </div>

      <!-- 庫存填報 -->
      <div id="inventoryTab" class="tab-content active">
        <div id="propertySwitcherArea" style="display: none; margin-bottom: 15px; padding: 14px 18px; background: #fff8e1; border-left: 5px solid #ffa726; border-radius: 6px;">
          <label style="font-size: 14px; font-weight: 700; color: #5d4037;">
            🔀 切換填報的館別：
            <select id="propertySwitcher" onchange="onSelectedPropertyChange()" style="padding: 10px 14px; margin-left: 10px; border-radius: 6px; border: 2px solid #ffa726; font-size: 15px; font-weight: 700; background: white; cursor: pointer;"></select>
          </label>
          <p style="margin: 8px 0 0; font-size: 12px; color: #6d4c41;">您管理多個館別，請先選擇要填報的館後再輸入庫存。每個館要分開提交。</p>
        </div>
        <div id="inventoryPropertyBanner" style="display: none; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 18px 24px; border-radius: 10px; margin-bottom: 18px; box-shadow: 0 4px 12px rgba(102,126,234,0.3);">
          <div style="font-size: 13px; opacity: 0.85; letter-spacing: 1px; margin-bottom: 4px;">目前填報館別</div>
          <div style="font-size: 26px; font-weight: 800; letter-spacing: 1px;">📍 <span id="inventoryPropertyName"></span></div>
        </div>
        <h2>月底庫存填報</h2>
        <p style="color: #666; margin-bottom: 20px;">請於月底 30 日前填報各項備品的剩餘庫存量</p>

        <div id="successMessage" class="success-message"></div>
        <div id="errorMessage" class="error-message"></div>

        <div id="inventoryForm" class="inventory-form"></div>

        <div class="btn-group">
          <button class="btn btn-primary" onclick="submitInventory()">✅ 提交庫存</button>
          <button class="btn" onclick="location.reload()" style="background: #95a5a6; color: white;">🔄 重設表單</button>
        </div>
      </div>

      <!-- 叫貨單 -->
      <div id="ordersTab" class="tab-content">
        <h2>叫貨單</h2>
        <p style="color: #666; margin-bottom: 20px;">系統根據庫存自動生成的叫貨單</p>

        <div id="ordersContainer"></div>
      </div>

      <!-- 歷史記錄 -->
      <div id="historyTab" class="tab-content">
        <h2>庫存歷史記錄</h2>
        <p style="color: #666; margin-bottom: 20px;">過去 12 個月的庫存記錄</p>

        <div id="historyContainer"></div>
      </div>

      <!-- 設定 -->
      <div id="settingsTab" class="tab-content">
        <h2>⚙️ 每月叫貨量設定</h2>
        <p style="color: #666; margin-bottom: 20px;">設定各館別每月的固定叫貨箱數</p>

        <div id="settingsMessage" class="success-message"></div>
        <div id="settingsError" class="error-message"></div>

        <div style="margin-bottom: 20px;">
          <label for="propertySelect" style="font-weight: 600;">選擇館別：</label>
          <select id="propertySelect" onchange="loadPropertyProducts()" style="padding: 10px; margin-left: 10px; border-radius: 5px; border: 1px solid #ddd;">
            <option value="">-- 所有館別 --</option>
          </select>
        </div>

        <!-- 產品勾選區域 -->
        <div id="productSelectContainer" style="display: none; margin-bottom: 25px; padding: 15px; background: #f9f9f9; border-radius: 8px; border-left: 4px solid #667eea;">
          <h3 style="margin-bottom: 15px; color: #333;">選擇使用的品項</h3>
          <div id="productCheckboxes" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px;"></div>
          <button class="btn btn-primary" style="margin-top: 15px;" onclick="savePropertyProducts()">保存品項選擇</button>
        </div>

        <div id="quotasContainer"></div>
      </div>

      <!-- 品項管理 -->
      <div id="productsTab" class="tab-content">
        <h2>📦 品項管理</h2>
        <p style="color: #666; margin-bottom: 20px;">管理所有備品項目</p>

        <div id="productsMessage" class="success-message"></div>
        <div id="productsError" class="error-message"></div>

        <div style="margin-bottom: 20px; padding: 15px; background: #f5f5f5; border-radius: 5px;">
          <h3 style="margin-bottom: 15px;">新增備品</h3>
          <div style="display: grid; grid-template-columns: 1fr 1fr auto; gap: 10px;">
            <input type="text" id="newProductName" placeholder="備品名稱" style="padding: 10px; border: 1px solid #ddd; border-radius: 4px;">
            <input type="number" id="newProductSize" placeholder="單箱規格（個數）" min="1" style="padding: 10px; border: 1px solid #ddd; border-radius: 4px;">
            <button class="btn btn-primary" onclick="addProduct()" style="padding: 10px 20px;">新增</button>
          </div>
        </div>

        <div id="productsContainer"></div>
      </div>

      <!-- 用戶管理 -->
      <div id="usersTab" class="tab-content">
        <h2>👥 用戶管理</h2>
        <p style="color: #666; margin-bottom: 20px;">管理各館登入帳號和密碼</p>

        <div id="usersMessage" class="success-message"></div>
        <div id="usersError" class="error-message"></div>

        <div style="margin-bottom: 20px; padding: 15px; background: #f5f5f5; border-radius: 5px;">
          <h3 style="margin-bottom: 15px;">新增用戶</h3>
          <div style="display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 10px;">
            <input type="text" id="newUsername" placeholder="帳號" style="padding: 10px; border: 1px solid #ddd; border-radius: 4px;">
            <input type="password" id="newPassword" placeholder="密碼" style="padding: 10px; border: 1px solid #ddd; border-radius: 4px;">
            <select id="newRole" onchange="onRoleChange()" style="padding: 10px; border: 1px solid #ddd; border-radius: 4px;">
              <option value="staff">📋 員工</option>
              <option value="admin">🔑 管理員</option>
            </select>
            <button class="btn btn-primary" onclick="addUser()" style="padding: 10px 20px;">新增</button>
          </div>
          <div id="newPropertiesArea" style="margin-top: 12px; padding: 12px; background: white; border-radius: 6px; border: 1px solid #ddd;">
            <div style="font-size: 13px; font-weight: 600; color: #555; margin-bottom: 10px;">負責館別（可複選，組長/主任管多館就勾多個）：</div>
            <div id="newPropertiesCheckboxes" style="display: flex; flex-wrap: wrap; gap: 12px;"></div>
          </div>
          <p style="margin-top: 8px; font-size: 12px; color: #888;">員工至少要勾一個館別；管理員不需要勾。</p>
        </div>

        <div id="usersContainer"></div>
      </div>
    </div>
  </div>

  <script>
    // ===== 狀態管理 =====
    let currentUser = null;
    let products = [];
    let properties = [];
    let selectedPropertyId = null; // 員工目前正在填報的館別（多館主任會切換）

    // 取得目前登入者負責的所有館別 id（向下相容舊資料）
    function getCurrentUserPropertyIds() {
      if (!currentUser) return [];
      if (Array.isArray(currentUser.property_ids) && currentUser.property_ids.length > 0) {
        return currentUser.property_ids.map(Number);
      }
      return currentUser.property_id ? [Number(currentUser.property_id)] : [];
    }

    // ===== 初始化 =====
    window.addEventListener('load', () => {
      const savedUser = localStorage.getItem('user');
      if (savedUser) {
        currentUser = JSON.parse(savedUser);
        showDashboard();
      }
    });

    // ===== 登入 =====
    async function handleLogin(e) {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (data.success) {
          currentUser = data.user;
          localStorage.setItem('user', JSON.stringify(currentUser));
          showDashboard();
        } else {
          showError('loginError', data.error || '登入失敗');
        }
      } catch (err) {
        showError('loginError', '網路錯誤: ' + err.message);
      }
    }

    // ===== 顯示儀表板 =====
    async function showDashboard() {
      document.getElementById('loginPage').style.display = 'none';
      document.getElementById('dashboardPage').style.display = 'block';

      // 重置所有 tab 狀態，避免上一個使用者的分頁殘留
      document.querySelectorAll('.tab-content').forEach(t => {
        t.classList.remove('active');
        t.style.display = '';
      });
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));

      // 先載入產品與館別資料
      await loadProducts();
      await loadProperties();

      // 右上角標籤：管理員 / 多館主任 / 單館員工
      const userPropIds = getCurrentUserPropertyIds();
      let roleLabel;
      if (currentUser.role === 'admin') {
        roleLabel = '管理員';
      } else if (userPropIds.length > 1) {
        const names = userPropIds.map(pid => properties.find(p => p.id === pid)?.name).filter(Boolean);
        roleLabel = `${names.join('/')} 主任`;
      } else {
        const prop = properties.find(p => p.id === userPropIds[0]);
        roleLabel = prop ? `${prop.name} 員工` : '員工';
      }
      document.getElementById('userDisplay').textContent = `👤 ${currentUser.username} (${roleLabel})`;

      const inventoryBtn = document.querySelector('.tab-btn[onclick*="\'inventory\'"]');

      if (currentUser.role === 'admin') {
        // 管理員：顯示管理 tab、隱藏庫存填報、預設停在叫貨單
        document.getElementById('settingsTabBtn').style.display = 'block';
        document.getElementById('productsTabBtn').style.display = 'block';
        document.getElementById('usersTabBtn').style.display = 'block';
        if (inventoryBtn) inventoryBtn.style.display = 'none';
        document.getElementById('inventoryTab').style.display = 'none';
        setActiveTab('orders');
        loadOrders();
        loadQuotas();
        loadUsers();
      } else {
        // 員工：隱藏管理 tab、顯示庫存填報、預設停在庫存填報
        document.getElementById('settingsTabBtn').style.display = 'none';
        document.getElementById('productsTabBtn').style.display = 'none';
        document.getElementById('usersTabBtn').style.display = 'none';
        if (inventoryBtn) inventoryBtn.style.display = '';
        setActiveTab('inventory');

        // 預設選取第一個館別 + 渲染切換器
        selectedPropertyId = userPropIds[0] || null;
        setupPropertySwitcher();
        loadInventoryForm();
      }
    }

    // 多館員工的館別切換器：當 property_ids.length > 1 才顯示
    function setupPropertySwitcher() {
      const userPropIds = getCurrentUserPropertyIds();
      const area = document.getElementById('propertySwitcherArea');
      const select = document.getElementById('propertySwitcher');
      if (userPropIds.length > 1) {
        select.innerHTML = '';
        userPropIds.forEach(pid => {
          const prop = properties.find(p => p.id === pid);
          if (!prop) return;
          const opt = document.createElement('option');
          opt.value = pid;
          opt.textContent = prop.name;
          select.appendChild(opt);
        });
        select.value = selectedPropertyId;
        area.style.display = 'block';
      } else {
        area.style.display = 'none';
      }
    }

    function onSelectedPropertyChange() {
      selectedPropertyId = parseInt(document.getElementById('propertySwitcher').value);
      loadInventoryForm();
      if (document.getElementById('historyTab').classList.contains('active')) {
        loadHistory();
      }
    }

    // 程式碼呼叫用的 tab 切換（不依賴 event）
    function setActiveTab(tabName) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      const tab = document.getElementById(tabName + 'Tab');
      if (tab) tab.classList.add('active');
      const btn = document.querySelector(`.tab-btn[onclick*="'${tabName}'"]`);
      if (btn) btn.classList.add('active');
    }

    // ===== 登出 =====
    function handleLogout() {
      if (confirm('確定要登出嗎?')) {
        currentUser = null;
        localStorage.removeItem('user');
        document.getElementById('loginPage').style.display = 'block';
        document.getElementById('dashboardPage').style.display = 'none';
        document.getElementById('loginForm').reset();
      }
    }

    // ===== 獲取備品列表（同時供庫存填報、品項管理使用） =====
    async function loadProducts() {
      try {
        const res = await fetch('/api/products');
        const data = await res.json();
        products = data;
        allProductsList = data;
        if (document.getElementById('productsContainer')) {
          displayProducts();
        }
      } catch (err) {
        console.error('獲取備品失敗:', err);
      }
    }

    // ===== 獲取館別列表 =====
    async function loadProperties() {
      try {
        const res = await fetch('/api/properties');
        properties = await res.json();
      } catch (err) {
        console.error('獲取館別失敗:', err);
      }
    }

    // ===== 加載庫存表單（只顯示目前選中館別啟用的品項 + 顯示館名） =====
    async function loadInventoryForm() {
      const form = document.getElementById('inventoryForm');
      const banner = document.getElementById('inventoryPropertyBanner');
      const propertyNameEl = document.getElementById('inventoryPropertyName');
      const propertyId = selectedPropertyId;

      const property = properties.find(p => p.id === propertyId);
      const propertyName = property ? property.name : '';

      if (propertyId && propertyName) {
        propertyNameEl.textContent = propertyName;
        banner.style.display = 'block';
      } else {
        banner.style.display = 'none';
      }

      form.innerHTML = '';

      if (!propertyId) {
        form.innerHTML = '<p style="color: #c00; padding: 20px; background: #fff5f5; border-radius: 8px;">⚠️ 此帳號尚未指派館別，請聯絡管理員</p>';
        return;
      }

      try {
        const res = await fetch(`/api/property-products/${propertyId}`);
        const propertyProducts = await res.json();
        const enabledIds = new Set(propertyProducts.filter(pp => pp.enabled).map(pp => pp.product_id));

        const enabledProducts = products.filter(p => enabledIds.has(p.id));

        if (enabledProducts.length === 0) {
          form.innerHTML = '<p style="color: #999; padding: 20px; background: #f9f9f9; border-radius: 8px;">管理員尚未為此館啟用任何叫貨品項，請聯絡管理員設定</p>';
          return;
        }

        enabledProducts.forEach(product => {
          const threshold = Math.ceil(product.unit_size * 0.5);
          const item = document.createElement('div');
          item.className = 'product-item';
          item.innerHTML = `
            <div class="product-name">
              ${product.name}
              <span style="font-size: 12px; color: #999;">(${product.unit_size}個/箱)</span>
            </div>
            <div class="product-spec">
              臨界值: ${threshold}個 (50%)
            </div>
            <div class="product-input">
              <input type="number"
                id="product_${product.id}"
                placeholder="輸入剩餘數量"
                min="0"
                onchange="checkThreshold(${product.id}, ${threshold})"
                style="flex: 1;">
              <span id="warning_${product.id}" class="threshold-warning"></span>
            </div>
          `;
          form.appendChild(item);
        });
      } catch (err) {
        console.error('載入品項失敗:', err);
        form.innerHTML = `<p style="color: red;">載入失敗：${err.message}</p>`;
      }
    }

    // ===== 檢查臨界值 =====
    function checkThreshold(productId, threshold) {
      const input = document.getElementById(`product_${productId}`);
      const warning = document.getElementById(`warning_${productId}`);
      const quantity = parseInt(input.value) || 0;

      if (quantity < threshold) {
        warning.textContent = '⚠️ 低於臨界值，需要叫貨';
      } else {
        warning.textContent = '✅ 庫存充足';
      }
    }

    // ===== 提交庫存 =====
    async function submitInventory() {
      const inventory_data = [];
      let hasData = false;

      products.forEach(product => {
        const input = document.getElementById(`product_${product.id}`);
        if (!input) return; // 沒啟用的品項不會渲染到 DOM，跳過
        const quantity = input.value;

        if (quantity !== '' && quantity !== null) {
          inventory_data.push({
            product_id: product.id,
            quantity: parseInt(quantity)
          });
          hasData = true;
        }
      });

      if (!hasData) {
        showError('errorMessage', '請至少填寫一項備品庫存');
        return;
      }

      if (!selectedPropertyId) {
        showError('errorMessage', '尚未選擇館別');
        return;
      }

      try {
        const res = await fetch('/api/inventory/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            property_id: selectedPropertyId,
            inventory_data: inventory_data
          })
        });

        const data = await res.json();

        if (data.success) {
          showSuccess('successMessage', '✅ ' + (data.message || '庫存已成功提交'));
          setTimeout(() => {
            loadOrders();
            switchTab('orders');
          }, 1500);
        } else {
          showError('errorMessage', data.error || '提交失敗');
        }
      } catch (err) {
        showError('errorMessage', '網路錯誤: ' + err.message);
      }
    }

    // ===== 加載叫貨單 =====
    async function loadOrders() {
      try {
        const res = await fetch('/api/orders/latest');
        const orders = await res.json();

        const container = document.getElementById('ordersContainer');
        container.innerHTML = '';

        if (orders.length === 0) {
          container.innerHTML = '<p style="color: #999;">還沒有叫貨單</p>';
          return;
        }

        // 員工：只顯示自己負責的所有館別的訂單（多館主任會看到全部負責館）
        const userPropIds = getCurrentUserPropertyIds();
        const includesGroup3 = userPropIds.includes(3) || userPropIds.includes(4);
        const filteredOrders = currentUser.role === 'admin'
          ? orders
          : orders.map(order => ({
              ...order,
              items: order.items.filter(item => {
                if (userPropIds.includes(item.property_id)) return true;
                // 中正與福榮合併群組
                if (includesGroup3 && (item.property_id === 3 || item.property_id === 4)) return true;
                return false;
              })
            })).filter(order => order.items.length > 0);

        filteredOrders.forEach(order => {
          const orderDiv = document.createElement('div');
          orderDiv.className = 'product-item';
          orderDiv.style.marginBottom = '20px';

          let itemsHTML = '<table style="width: 100%; margin-top: 10px;"><thead><tr><th>館別</th><th>備品</th><th>剩餘量</th><th>叫貨箱數</th></tr></thead><tbody>';

          order.items.forEach(item => {
            itemsHTML += `<tr>
              <td>${item.property_name}</td>
              <td>${item.product_name}</td>
              <td>${item.quantity_needed}個</td>
              <td>${item.order_boxes}箱</td>
            </tr>`;
          });

          itemsHTML += '</tbody></table>';

          orderDiv.innerHTML = `
            <div class="product-name">
              訂單編號 #${order.id}
              <span class="status-${order.status}">${order.status === 'pending' ? '待處理' : '已完成'}</span>
            </div>
            <div class="product-spec">訂單日期: ${order.order_date}</div>
            ${itemsHTML}
          `;
          container.appendChild(orderDiv);
        });
      } catch (err) {
        console.error('獲取訂單失敗:', err);
      }
    }

    // ===== 加載歷史記錄（使用目前選中的館別） =====
    async function loadHistory() {
      const propertyId = selectedPropertyId || getCurrentUserPropertyIds()[0];
      if (!propertyId) {
        document.getElementById('historyContainer').innerHTML = '<p>管理員無法查看單個館別的歷史記錄</p>';
        return;
      }

      try {
        const res = await fetch(`/api/inventory/${propertyId}`);
        const records = await res.json();

        const container = document.getElementById('historyContainer');
        container.innerHTML = '';

        if (records.length === 0) {
          container.innerHTML = '<p style="color: #999;">還沒有庫存記錄</p>';
          return;
        }

        // 按日期分組
        const groupedByDate = {};
        records.forEach(record => {
          if (!groupedByDate[record.recorded_date]) {
            groupedByDate[record.recorded_date] = [];
          }
          groupedByDate[record.recorded_date].push(record);
        });

        Object.entries(groupedByDate)
          .sort(([dateA], [dateB]) => dateB.localeCompare(dateA))
          .forEach(([date, items]) => {

      document.querySelectorAll('.tab-btn').forEach(btn => {

      document.getElementById(tabName + 'Tab').classList.add('active');

        loadOrders();

        loadHistory();

      el.textContent = message;
      el.classList.add('show');
      setTimeout(() => {
        el.classList.remove('show');
      }, 4000);

      const el = document.getElementById(elementId);

    // 加載產品勾選框

    async function loadPropertyProducts() {
      const propertyId = document.getElementById('propertySelect').value;
      const container = document.getElementById('productSelectContainer');
      const checkboxContainer = document.getElementById('productCheckboxes');

      if (!propertyId) {
        container.style.display = 'none';
        loadQuotasForProperty();

      container.style.display = 'block';
      checkboxContainer.innerHTML = '⏳ 加載中...';

      try {
        // 獲取該館店的產品啟用狀態
        const res = await fetch(`/api/property-products/${propertyId}`);
        if (!res.ok) {
          throw new Error(`API 錯誤: ${res.status}`);
        }
        const propertyProducts = await res.json();

        console.log(`📦 取得 ${propertyProducts.length} 個產品`, propertyProducts);

        if (propertyProducts.length === 0) {
          checkboxContainer.innerHTML = '<p style="color: #999;">暫無產品數據</p>';
          return;
        }

        // 創建啟用狀態映射
        enabledProducts[propertyId] = {};

          enabledProducts[propertyId][pp.product_id] = pp.enabled;

        // 清空容器

        propertyProducts.forEach(pp => {

          `;
          checkboxContainer.appendChild(label);

        loadQuotasForProperty();

      const propertyId = document.getElementById('propertySelect').value;
      if (!propertyId) return;

      try {
        const checkboxes = document.querySelectorAll('#productCheckboxes input[type="checkbox"]');
        for (const checkbox of checkboxes) {
          const productId = checkbox.getAttribute('data-product-id');
          const enabled = checkbox.checked;
          await fetch(`/api/property-products/${propertyId}/${productId}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ enabled })
          });

        let filtered = allQuotas.filter(q => q.property_id == propertyId);
        if (propertyId == 3) {
          // 如果選擇中正，加入福榮的配額
          const furongQuotas = allQuotas.filter(q => q.property_id == 4);
          filtered = filtered.concat(furongQuotas);

        displayQuotasByProperty(filtered, propertyId);
      } else {

    async function saveAllPropertyQuotas() {
      try {
        const inputs = document.querySelectorAll('#quotasContainer input[type="number"]');
        const updates = [];

        inputs.forEach(input => {
          const quotaId = input.getAttribute('data-quota-id');
          const newValue = parseInt(input.value);
          updates.push({ quotaId, newValue });
        });

        let allSuccess = true;
        for (const { quotaId, newValue } of updates) {
          const quota = allQuotas.find(q => q.id == quotaId);
          if (quota) {
            // 中正和福榮共用設定
            const propertyIds = currentPropertyId == 3 ? [3, 4] : [currentPropertyId];
            for (const pId of propertyIds) {
              const targetQuota = allQuotas.find(q => q.product_id == quota.product_id && q.property_id == pId);
              if (targetQuota) {
                const res = await fetch(`/api/monthly-quotas/${targetQuota.id}`, {
                  method: 'PUT',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ boxes_per_month: newValue })
                });
                if (!res.ok) {
                  allSuccess = false;
                  console.error(`保存失敗 quota ${targetQuota.id}:`, res.status);
                }
              }
            }
          }
        }

        if (allSuccess) {
          showSuccess('settingsMessage', '✅ 所有設定已保存');
          // 重新加載數據但保持在原頁面
          await loadQuotas();
          loadQuotasForProperty();
        } else {
          showError('settingsError', '部分設定保存失敗，請重試');
        }
      } catch (err) {
        showError('settingsError', '保存失敗: ' + err.message);
      }
    }

    async function updateQuota(quotaId) {
      const input = document.getElementById(`quota_${quotaId}`);
      const newValue = parseInt(input.value);

      if (newValue < 0 || isNaN(newValue)) {
        showError('settingsError', '請輸入有效的箱數');
        return;
      }

      try {
        const res = await fetch(`/api/monthly-quotas/${quotaId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ boxes_per_month: newValue })
        });

        const data = await res.json();
        if (data.success) {
          showSuccess('settingsMessage', '✅ 設定已保存');
          // 更新本地數據
          const quota = allQuotas.find(q => q.id === quotaId);
          if (quota) quota.boxes_per_month = newValue;
        } else {
          showError('settingsError', '保存失敗');
        }
      } catch (err) {
        showError('settingsError', '網路錯誤: ' + err.message);
      }
    }

    async function editProduct(id, name, size) {
      const newSize = prompt(`編輯 ${name} 的單箱規格（個數）:`, size);
      if (newSize === null) return;

      try {
        const res = await fetch(`/api/products/${id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: name, unit_size: parseInt(newSize) })
        });

        const data = await res.json();
        if (data.success) {
          showSuccess('productsMessage', '✅ 規格已更新');
          loadProducts();
        } else {
          showError('productsError', '更新失敗');
        }
      } catch (err) {
        showError('productsError', '更新失敗: ' + err.message);
      }
    }

    async function addProduct() {
      const name = document.getElementById('newProductName').value;
      const size = parseInt(document.getElementById('newProductSize').value);

      if (!name || !size) {
        showError('productsError', '請填寫完整資訊');
        return;
      }

      try {
        const res = await fetch('/api/products', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, unit_size: size })
        });

        const data = await res.json();
        if (data.success) {
          showSuccess('productsMessage', '✅ 備品已新增');
          document.getElementById('newProductName').value = '';
          document.getElementById('newProductSize').value = '';
          loadProducts();
        }
      } catch (err) {
        showError('productsError', '新增失敗: ' + err.message);
      }
    }

    async function deleteProduct(id) {
      if (!confirm('確定要刪除此備品嗎?')) return;

      try {
        const res = await fetch(`/api/products/${id}`, { method: 'DELETE' });
        const data = await res.json();
        if (res.ok && data.success) {
          showSuccess('productsMessage', '✅ 備品已刪除');
          loadProducts();
        } else {
          showError('productsError', '刪除失敗: ' + (data.error || '未知錯誤'));
        }
      } catch (err) {
        showError('productsError', '刪除失敗: ' + err.message);
      }
    }

        console.error('獲取用戶失敗:', err);
      }
    }

    // 重新渲染館別勾選框（福榮與中正合併，不顯示）
    function refreshPropertyOptions() {
      const container = document.getElementById('newPropertiesCheckboxes');
      container.innerHTML = '';
      properties.forEach(prop => {
        if (prop.name === '福榮') return;
        const label = document.createElement('label');
        label.style.cssText = 'display: inline-flex; align-items: center; padding: 8px 12px; background: #f5f5f5; border-radius: 6px; cursor: pointer; user-select: none; border: 2px solid transparent; transition: border 0.2s;';
        label.innerHTML = `
          <input type="checkbox" value="${prop.id}" class="new-property-checkbox" style="margin-right: 8px; width: 16px; height: 16px; cursor: pointer;" onchange="this.parentElement.style.borderColor = this.checked ? '#667eea' : 'transparent'">
          <span style="font-size: 14px; font-weight: 600; color: #333;">${prop.name}</span>
        `;
        container.appendChild(label);
      });
    }

    // 角色切換：管理員隱藏館別勾選區、員工顯示
    function onRoleChange() {
      const role = document.getElementById('newRole').value;
      const area = document.getElementById('newPropertiesArea');
      area.style.display = role === 'admin' ? 'none' : 'block';
      if (role === 'admin') {
        document.querySelectorAll('.new-property-checkbox').forEach(cb => {
          cb.checked = false;
          cb.parentElement.style.borderColor = 'transparent';
        });
      }
    }

    function displayUsers() {
      const container = document.getElementById('usersContainer');
      container.innerHTML = '';

      if (allUsersList.length === 0) {
        container.innerHTML = '<p style="color: #999; text-align: center; padding: 30px;">還沒有用戶</p>';
        return;
      }

      allUsersList.forEach(user => {
        const card = document.createElement('div');
        card.className = 'card';
        const propNames = Array.isArray(user.property_names) ? user.property_names : [];
        const propDisplay = user.role === 'admin'
          ? '(管理員)'
          : (propNames.length > 0 ? propNames.join(' / ') : (user.property_name || '未設定'));
        const roleDisplay = user.role === 'admin'
          ? '🔑 管理員'
          : (propNames.length > 1 ? `👔 主任（管 ${propNames.length} 館）` : '📋 員工');
        card.innerHTML = `
          <div class="card-header">
            <div class="card-title">👤 ${user.username}</div>
            <div class="card-actions">
              <button class="btn" style="background: #3498db; color: white; padding: 8px 12px; font-size: 12px;" onclick="editUser(${user.id})">編輯</button>
              <button class="btn btn-danger" style="padding: 8px 12px; font-size: 12px;" onclick="deleteUser(${user.id})">刪除</button>
            </div>
          </div>
          <div class="card-content">
            <div class="card-info">
              <div class="card-info-label">負責館別</div>
              <div class="card-info-value">${propDisplay}</div>
            </div>
            <div class="card-info">
              <div class="card-info-label">角色</div>
              <div class="card-info-value">${roleDisplay}</div>
            </div>
          </div>
        `;
        container.appendChild(card);
      });
    }

    async function addUser() {
      const username = document.getElementById('newUsername').value.trim();
      const password = document.getElementById('newPassword').value;
      const role = document.getElementById('newRole').value;

      if (!username || !password) {
        showError('usersError', '請填寫帳號和密碼');
        return;
      }

      let property_ids = [];
      if (role === 'staff') {
        property_ids = Array.from(document.querySelectorAll('.new-property-checkbox:checked'))
          .map(cb => parseInt(cb.value));
        if (property_ids.length === 0) {
          showError('usersError', '員工至少要勾選一個館別');
          return;
        }
      }

      try {
        const res = await fetch('/api/users', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password, role, property_ids })
        });

        const data = await res.json();
        if (res.ok && data.success) {
          showSuccess('usersMessage', '✅ 用戶已新增');
          document.getElementById('newUsername').value = '';
          document.getElementById('newPassword').value = '';
          document.getElementById('newRole').value = 'staff';
          document.querySelectorAll('.new-property-checkbox').forEach(cb => {
            cb.checked = false;
            cb.parentElement.style.borderColor = 'transparent';
          });
          onRoleChange();
          loadUsers();
        } else {
          showError('usersError', data.error || '新增失敗');
        }
      } catch (err) {
        showError('usersError', '新增失敗: ' + err.message);
      }
    }

    async function deleteUser(id) {
      if (!confirm('確定要刪除此用戶嗎?')) return;

      try {
        const res = await fetch(`/api/users/${id}`, { method: 'DELETE' });
        const data = await res.json();
        if (data.success) {
          showSuccess('usersMessage', '✅ 用戶已刪除');
          loadUsers();
        }
      } catch (err) {
        showError('usersError', '刪除失敗: ' + err.message);
      }
    }

    async function editUser(id) {
      const user = allUsersList.find(u => u.id === id);
      if (!user) return;

      // 1. 密碼（留白則不改）
      const newPassword = prompt(`編輯用戶：${user.username}\n\n輸入新密碼（留白則不改）：`, '');
      if (newPassword === null) return;

      // 2. 角色
      const roleInput = prompt(`角色設定：\n  輸入 1 = 員工\n  輸入 2 = 管理員\n（留白則不改，目前為${user.role === 'admin' ? '管理員' : '員工'}）`, '');
      if (roleInput === null) return;

      let newRole = user.role;
      if (roleInput === '1') newRole = 'staff';
      else if (roleInput === '2') newRole = 'admin';
      else if (roleInput !== '') {
        showError('usersError', '角色輸入無效');
        return;
      }

      // 3. 負責館別（員工才需要，支援多館用逗號分隔）
      let newPropertyIds = Array.isArray(user.property_ids) && user.property_ids.length > 0
        ? user.property_ids.slice()
        : (user.property_id ? [user.property_id] : []);

      if (newRole === 'staff') {
        const propList = properties
          .filter(p => p.name !== '福榮')
          .map(p => `  ${p.id} = ${p.name}`).join('\n');
        const currentIds = newPropertyIds.join(',');
        const propInput = prompt(
          `負責館別代號（多個用逗號分隔，例 5,6 表示同時負責小西和福壽）：\n${propList}\n（留白則不改，目前為 ${currentIds || '未設定'}）`,
          currentIds
        );
        if (propInput === null) return;
        if (propInput.trim() !== '') {
          const parsed = propInput.split(',').map(s => parseInt(s.trim())).filter(n => !isNaN(n));
          if (parsed.some(pid => !properties.some(p => p.id === pid))) {
            showError('usersError', '有無效的館別代號');
            return;
          }
          newPropertyIds = parsed;
        }
        if (newPropertyIds.length === 0) {
          showError('usersError', '員工至少要設定一個館別');
          return;
        }
      } else {
        newPropertyIds = [];
      }

      try {
        const res = await fetch(`/api/users/${id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: user.username,
            password: newPassword || user.password,
            property_ids: newPropertyIds,
            role: newRole
          })
        });
        const data = await res.json();
        if (res.ok && data.success) {
          showSuccess('usersMessage', '✅ 用戶已更新');
          loadUsers();
        } else {
          showError('usersError', data.error || '更新失敗');
        }
      } catch (err) {
        showError('usersError', '更新失敗: ' + err.message);
      }
    }

    // ===== 修改 switchTab 函數支持設定 =====
    const originalSwitchTab = switchTab;
    switchTab = function(tabName) {
      // 隱藏所有標籤
      document.querySelectorAll('.tab-content').forEach(tab => {
        tab.classList.remove('active');
      });
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.remove('active');
      });

      // 顯示選定的標籤
      document.getElementById(tabName + 'Tab').classList.add('active');
      event.target.classList.add('active');

      // 加載對應的內容
      if (tabName === 'orders') {
        loadOrders();
      } else if (tabName === 'history') {
        loadHistory();
      } else if (tabName === 'settings') {
        loadQuotas();
      } else if (tabName === 'products') {
        loadProducts();
      } else if (tabName === 'users') {
        loadUsers();
      }
    };
  </script>
</body>
</html>
